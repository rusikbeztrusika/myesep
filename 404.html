<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Страница не найдена | MyEsep.kz</title>
  <meta name="description" content="Страница не найдена. Вернитесь на главную MyEsep.kz и продолжите расчёт налогов." />
  <meta name="theme-color" content="#111a36" />
  <link rel="icon" href="./favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
  <link rel="manifest" href="./site.webmanifest" />
  <style>
    :root {
      --bg: #111a36;
      --card: rgba(255, 255, 255, 0.09);
      --border: rgba(214, 222, 255, 0.28);
      --text: #f6fbff;
      --muted: #b7c4ea;
      --accent: #7c72ff;
      --accent2: #8b5cf6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Rubik", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% -8%, rgba(130, 145, 255, 0.25), transparent 42%),
        radial-gradient(circle at 90% 0%, rgba(139, 92, 246, 0.24), transparent 36%),
        linear-gradient(180deg, #0a1024, var(--bg) 48%, #162246);
      padding: 20px;
    }

    .shell {
      width: min(680px, 100%);
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card);
      backdrop-filter: blur(8px);
      box-shadow: 0 28px 64px rgba(2, 11, 22, 0.46);
      padding: 28px 24px;
      text-align: center;
    }

    .logo {
      margin: 0 0 16px;
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .logo span {
      color: #a5b1ff;
    }

    .code {
      display: inline-block;
      margin: 0 0 10px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(214, 222, 255, 0.35);
      background: rgba(214, 222, 255, 0.12);
      color: #dfe7ff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 6vw, 44px);
      line-height: 1.08;
      letter-spacing: -0.01em;
    }

    p {
      margin: 14px auto 0;
      max-width: 40ch;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
    }

    .actions {
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 46px;
      padding: 0 18px;
      border-radius: 12px;
      border: 1px solid transparent;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 140ms ease, filter 140ms ease, box-shadow 140ms ease;
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translateY(-1px);
      filter: brightness(1.03);
      outline: none;
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 12px 24px rgba(99, 102, 241, 0.32);
    }

    .btn-ghost {
      color: #dce5ff;
      background: rgba(214, 222, 255, 0.12);
      border-color: rgba(214, 222, 255, 0.3);
    }
  </style>
</head>
<body>
  <main class="shell" role="main">
    <h2 class="logo">MyEsep<span>.kz</span></h2>
    <div class="code">ОШИБКА 404</div>
    <h1>Страница не найдена</h1>
    <p>Похоже, ссылка устарела или адрес введён с ошибкой. Вернитесь на главную и продолжите работу.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Перейти на главную</a>
      <a class="btn btn-ghost" href="javascript:history.back()">Назад</a>
    </div>
  </main>
</body>
</html>
